# FrankenPHP PHP Configuration

; Memory limit for PHP scripts
memory_limit = 512M

; Maximum time a script is allowed to run
max_execution_time = 300

; Maximum time a script is allowed to spend parsing request data
max_input_time = 60

; Maximum size of POST data that PHP will accept
post_max_size = 100M

; Maximum allowed size for uploaded files
upload_max_filesize = 100M

; Number of simultaneous database connections allowed
; max_db_connections = 20

; Display errors (set to 0 in production)
display_errors = 1
error_reporting = E_ALL

; Log errors to file
; error_log = /var/log/php/error.log

; Set default timezone
date.timezone = UTC

; Enable short tags
short_open_tag = On

; Session settings
session.gc_maxlifetime = 1440

; Output buffering
output_buffering = 4096

; MySQL settings
mysqli.max_persistent = 0
mysqli.max_links = 0
mysqli.default_port = 3306
mysqli.default_socket = "/var/run/mysqld/mysqld.sock"

; PDO settings
pdo_mysql.default_socket = "/var/run/mysqld/mysqld.sock"

; Compilation
realpath_cache_size = 4096k
realpath_cache_ttl = 600

; File uploads
file_uploads = On
upload_tmp_dir = /tmp
max_file_uploads = 20

; OPCache settings (if compiled)
; opcache.enable = 1
; opcache.memory_consumption = 128
; opcache.max_accelerated_files = 4000
; opcache.validate_timestamps = 1
; opcache.revalidate_freq = 2

